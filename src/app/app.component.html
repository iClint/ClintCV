<mat-sidenav-container class="app-shell" autosize>
  <mat-sidenav #sidenav mode="over" position="end" class="app-sidenav">
    <app-nav-menu
      [items]="config.navMenu.items"
      layout="vertical"
      (navigate)="sidenav.close()"
    ></app-nav-menu>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <app-header
      [title]="config.header.title"
      [subtitle]="config.header.subtitle"
      [description]="config.header.description"
      [navMenuItems]="config.navMenu.items"
      (menuToggle)="sidenav.toggle()"
    ></app-header>

    <main class="app-main">
      <router-outlet></router-outlet>
    </main>

    <app-footer></app-footer>
  </mat-sidenav-content>
</mat-sidenav-container>

<app-light-box />
