<div class="page-body">
  <main class="content-column projects">
    <header class="projects__intro" appReveal>
      <span class="section-eyebrow">// Selected work</span>
      <h1 class="gradient-text">{{ content.title }}</h1>
      <p>{{ content.description }}</p>
      <h2 class="projects__heading">{{ content.heading }}</h2>
    </header>

    <div class="projects__grid">
      @for (item of content.projects; track item.url; let i = $index) {
        <mat-card
          appearance="outlined"
          class="glass projects__card"
          appReveal
          [revealDelay]="i * 80"
          tabindex="0"
          [routerLink]="item.url"
          [attr.aria-label]="item.title"
        >
          @if (item.thumbnail) {
            <img
              mat-card-image
              class="projects__thumbnail"
              [src]="item.thumbnail"
              [alt]="item.title + ' thumbnail'"
            />
          }
          <mat-card-header>
            <mat-card-title>{{ item.title }}</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <p>{{ item.description }}</p>
          </mat-card-content>
          <mat-card-actions align="end">
            <span class="projects__cta">
              View project
              <mat-icon aria-hidden="true">arrow_forward</mat-icon>
            </span>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  </main>
</div>
